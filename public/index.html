<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="theme-color" content="#1D9E75">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="PVD Feed">
<link rel="manifest" href="/manifest.json">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>PVD Feed - City of Providence News</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #f5f5f5; color: #333; }
    .header { background: white; border-bottom: 1px solid #eee; padding: 16px 20px; display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .header h1 { font-size: 22px; color: #1D9E75; }
    .header p { font-size: 14px; color: #888; margin-top: 2px; }
    .lang-switch { display: flex; gap: 4px; flex-shrink: 0; }
    .lang-btn { border: 1px solid #ddd; border-radius: 14px; padding: 4px 10px; font-size: 12px; cursor: pointer; background: white; color: #555; white-space: nowrap; }
    .lang-btn.active { background: #1D9E75; border-color: #1D9E75; color: white; }
    .filters { display: flex; gap: 8px; padding: 16px 20px; overflow-x: auto; background: white; border-bottom: 1px solid #eee; }
    .filters::-webkit-scrollbar { display: none; }
    .chip { border: 1px solid #ddd; border-radius: 20px; padding: 6px 14px; font-size: 13px; cursor: pointer; white-space: nowrap; background: white; }
    .chip.active { background: #1D9E75; border-color: #1D9E75; color: white; }
    .feed { max-width: 600px; margin: 0 auto; padding: 16px; }
    .card { background: white; border: 1px solid #eee; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
    .cat { font-size: 11px; color: #1D9E75; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; font-weight: 600; }
    .title { font-size: 15px; font-weight: 600; margin-bottom: 6px; color: #1a1a1a; }
    .summary { font-size: 14px; line-height: 1.55; color: #555; }
    .footer { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }
    .time { font-size: 12px; color: #aaa; }
    .source { font-size: 12px; color: #1D9E75; text-decoration: none; }
    .source:hover { text-decoration: underline; }
    #loading { text-align: center; padding: 40px; color: #888; }
    .empty { text-align: center; padding: 40px; color: #888; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1 id="headerTitle">PVD Feed</h1>
      <p id="headerSubtitle">City of Providence news, summarized for residents</p>
    </div>
    <div class="lang-switch" id="langSwitch">
      <div class="lang-btn active" data-lang="en">EN</div>
      <div class="lang-btn" data-lang="es">ES</div>
      <div class="lang-btn" data-lang="pt">PT</div>
      <div class="lang-btn" data-lang="zh">中文</div>
    </div>
  </div>
  <div class="filters" id="filters"></div>
  <div class="feed">
    <div id="loading">Loading posts...</div>
    <div id="posts"></div>
  </div>

  <script>
    const STRINGS = {
      en: {
        title: 'PVD Feed',
        subtitle: 'City of Providence news, summarized for residents',
        loading: 'Loading posts...',
        error: 'Error loading posts. Please refresh.',
        empty: 'No posts in this category yet.',
        readMore: 'Read full article →',
        categories: { all: 'All', Roads: 'Roads', Budget: 'Budget', Schools: 'Schools', Events: 'Events', Safety: 'Safety', Housing: 'Housing', Other: 'Other' }
      },
      es: {
        title: 'PVD Feed',
        subtitle: 'Noticias de la ciudad de Providence, resumidas para residentes',
        loading: 'Cargando publicaciones...',
        error: 'Error al cargar. Por favor actualice la página.',
        empty: 'Todavía no hay publicaciones en esta categoría.',
        readMore: 'Leer artículo completo →',
        categories: { all: 'Todo', Roads: 'Calles', Budget: 'Presupuesto', Schools: 'Escuelas', Events: 'Eventos', Safety: 'Seguridad', Housing: 'Vivienda', Other: 'Otro' }
      },
      pt: {
        title: 'PVD Feed',
        subtitle: 'Notícias da cidade de Providence, resumidas para os moradores',
        loading: 'Carregando publicações...',
        error: 'Erro ao carregar. Por favor, atualize a página.',
        empty: 'Ainda não há publicações nesta categoria.',
        readMore: 'Ler artigo completo →',
        categories: { all: 'Todos', Roads: 'Ruas', Budget: 'Orçamento', Schools: 'Escolas', Events: 'Eventos', Safety: 'Segurança', Housing: 'Habitação', Other: 'Outro' }
      },
      zh: {
        title: 'PVD Feed',
        subtitle: '普罗维登斯市新闻，为居民提供简明摘要',
        loading: '正在加载...',
        error: '加载失败，请刷新页面。',
        empty: '该分类暂无内容。',
        readMore: '阅读全文 →',
        categories: { all: '全部', Roads: '道路', Budget: '预算', Schools: '学校', Events: '活动', Safety: '安全', Housing: '住房', Other: '其他' }
      }
    };

    let allPosts = [];
    let currentFilter = 'all';
    let currentLang = localStorage.getItem('pvdLang') || 'en';

    function t() {
      return STRINGS[currentLang] || STRINGS.en;
    }

    function renderChrome() {
      const s = t();
      document.getElementById('headerTitle').textContent = s.title;
      document.getElementById('headerSubtitle').textContent = s.subtitle;
      document.getElementById('loading').textContent = s.loading;

      const cats = ['all', 'Roads', 'Budget', 'Schools', 'Events', 'Safety', 'Housing', 'Other'];
      document.getElementById('filters').innerHTML = cats.map(cat => `
        <div class="chip ${cat === currentFilter ? 'active' : ''}" data-cat="${cat}">${s.categories[cat]}</div>
      `).join('');
      document.querySelectorAll('.chip').forEach(el => {
        el.addEventListener('click', () => filterBy(el.dataset.cat, el));
      });

      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === currentLang);
      });
    }

    function setLang(lang) {
      currentLang = lang;
      localStorage.setItem('pvdLang', lang);
      renderChrome();
      renderPosts();
    }

    async function loadPosts() {
      try {
        const res = await fetch('/posts.json', { cache: 'no-store' });
        if (!res.ok) throw new Error('posts.json returned ' + res.status);
        const data = await res.json();
        allPosts = data.slice(0, 50);
        document.getElementById('loading').style.display = 'none';
        renderPosts();
      } catch (err) {
        document.getElementById('loading').textContent = t().error;
        console.error(err);
      }
    }

    function summaryFor(post) {
      if (typeof post.summary === 'string') return post.summary; // old-format fallback
      if (post.summary && post.summary[currentLang]) return post.summary[currentLang];
      if (post.summary && post.summary.en) return post.summary.en;
      return '';
    }

    function renderPosts() {
      const s = t();
      const filtered = currentFilter === 'all'
        ? allPosts
        : allPosts.filter(p => p.category === currentFilter);

      if (filtered.length === 0) {
        document.getElementById('posts').innerHTML = `<div class="empty">${s.empty}</div>`;
        return;
      }

      document.getElementById('posts').innerHTML = filtered.map(post => `
        <div class="card">
          <div class="cat">${s.categories[post.category] || post.category || s.categories.Other}</div>
          <div class="title">${post.title}</div>
          <div class="summary">${summaryFor(post) || '...'}</div>
          <div class="footer">
           <span class="time">${post.published_at ? new Date(post.published_at).toLocaleDateString(currentLang === 'en' ? 'en-US' : currentLang, { month: 'short', day: 'numeric', year: 'numeric' }) : ''}</span>
            ${post.source_url ? `<a class="source" href="${post.source_url}" target="_blank">${s.readMore}</a>` : ''}
          </div>
        </div>
      `).join('');
    }

    function filterBy(cat) {
      currentFilter = cat;
      renderChrome();
      renderPosts();
    }

    document.getElementById('langSwitch').addEventListener('click', (e) => {
      const btn = e.target.closest('.lang-btn');
      if (btn) setLang(btn.dataset.lang);
    });

    renderChrome();
    loadPosts();
  </script>
  <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
</script>
</body>
</html>
