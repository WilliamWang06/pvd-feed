name: Monthly scraper and summarizer

on:
  schedule:
    - cron: '0 11 1 * *'
  workflow_dispatch:

permissions:
  contents: write

# Prevents two runs from editing posts.json at the same time, which causes unresolvable
# merge conflicts. A run triggered while one is already in progress will wait its turn
# instead of running in parallel.
concurrency:
  group: posts-pipeline
  cancel-in-progress: false

jobs:
  run-scrapers:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run scraper
        run: node scraper.js

      - name: Run summarizer
        run: node summarizer.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit updated posts.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/posts.json
          git diff --staged --quiet || git commit -m "Update posts [automated]"
          git pull --rebase --autostash origin main
          git push
